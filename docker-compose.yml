services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: alma
      POSTGRES_PASSWORD: alma
      POSTGRES_DB: alma
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U alma -d alma"]
      interval: 2s
      timeout: 3s
      retries: 15

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: alma
      MINIO_ROOT_PASSWORD: alma-minio-secret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 2s
      timeout: 3s
      retries: 15

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+psycopg://alma:alma@db:5432/alma
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-me-32-bytes-minimum!}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-attorney@example.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-letmein}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      ADMIN_ALLOWED_EMAILS: ${ADMIN_ALLOWED_EMAILS:-nhshpr@gmail.com,noahs921@gmail.com,noahshapiro.dev@gmail.com}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      EMAIL_FROM: ${EMAIL_FROM:-Alma <onboarding@resend.dev>}
      ATTORNEY_NOTIFICATION_EMAIL: ${ATTORNEY_NOTIFICATION_EMAIL:-attorney@example.com}
      FRONTEND_ORIGIN: http://localhost:3000
      S3_ENDPOINT_URL: http://minio:9000
      S3_BUCKET: resumes
      S3_ACCESS_KEY: alma
      S3_SECRET_KEY: alma-minio-secret
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000
        NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  db_data:
  minio_data:
